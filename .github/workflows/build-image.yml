name: Build & push image

# Baut das Production-Image und schiebt es ins GitHub Container Registry.
# Pull-Ziel für jedes Jelastic-Environment: ghcr.io/<owner>/edu-platform:latest
#
# Tags pro Push:
#   - latest                  (immer der jüngste main-Build)
#   - main-<short-sha>        (Audit-fähig, jede Version wiederfindbar)
#   - v1.2.3                  (nur bei git tag vX.Y.Z)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: # Manuell auf Knopfdruck im GitHub-UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # → ghcr.io/finnofleet/ff-fiknow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Push ins GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Jelastic läuft auf amd64 — multi-arch nicht nötig
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
