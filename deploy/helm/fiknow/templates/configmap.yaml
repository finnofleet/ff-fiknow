apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fiknow.fullname" . }}-env
  labels:
    {{- include "fiknow.labels" . | nindent 4 }}
data:
  # FIKNOW ist OIDC-only (Keycloak) — kein AUTH_PROVIDER-Schalter mehr.
  {{- with .Values.config.OIDC_ISSUER }}
  OIDC_ISSUER: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.OIDC_CLIENT_ID }}
  OIDC_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.OIDC_ROLE_MAP }}
  OIDC_ROLE_MAP: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.OIDC_SCOPES }}
  OIDC_SCOPES: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.OIDC_SESSION_MAX_AGE_SEC }}
  OIDC_SESSION_MAX_AGE_SEC: {{ . | quote }}
  {{- end }}
  {{- $redirectBase := include "fiknow.redirectBase" . }}
  {{- if $redirectBase }}
  OIDC_REDIRECT_BASE: {{ $redirectBase | quote }}
  {{- end }}
  {{- with .Values.config.DB_POOL_MAX }}
  DB_POOL_MAX: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.MEDIA_STORAGE_DIR }}
  MEDIA_STORAGE_DIR: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.BUNDLE_STORAGE_DIR }}
  BUNDLE_STORAGE_DIR: {{ . | quote }}
  {{- end }}
  {{- range $k, $v := .Values.config.extra }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
