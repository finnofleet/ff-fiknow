<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" role="img" aria-labelledby="t2 d2" font-family="Sora, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="t2">Drei-Schritt-Ablauf (fiknow)</title>
  <desc id="d2">Linearer Ablauf: Erfassen, Prüfen, Freigeben. Der Abschluss ist mit dem Lime-Akzent hervorgehoben. fiknow clean, theme-adaptiv.</desc>

  <defs>
    <marker id="ah-ink" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="11" refY="7" orient="auto-start-reverse">
      <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <line x1="3" y1="2.5" x2="11" y2="7"/>
        <line x1="3" y1="11.5" x2="11" y2="7"/>
      </g>
    </marker>
  </defs>

  <!-- transparent: kein Hintergrund-Rect -->

  <!-- Karten: currentColor-Füllung (adaptiv), Abschluss = Lime (fix) -->
  <rect x="50"  y="70" width="180" height="110" rx="14" fill="currentColor" fill-opacity="0.06"/>
  <rect x="310" y="70" width="180" height="110" rx="14" fill="currentColor" fill-opacity="0.06"/>
  <rect x="570" y="70" width="180" height="110" rx="14" fill="#99FF33"/>

  <!-- Verbinder: offene Chevrons, currentColor -->
  <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
    <line x1="232" y1="125" x2="305" y2="125" marker-end="url(#ah-ink)"/>
    <line x1="492" y1="125" x2="565" y2="125" marker-end="url(#ah-ink)"/>
  </g>

  <!-- Nummern-Kreise -->
  <circle cx="82"  cy="100" r="14" fill="none" stroke="currentColor" stroke-opacity="0.35" stroke-width="1.3"/>
  <circle cx="342" cy="100" r="14" fill="none" stroke="currentColor" stroke-opacity="0.35" stroke-width="1.3"/>
  <circle cx="602" cy="100" r="14" fill="none" stroke="#3B5A1C" stroke-width="1.3"/>

  <!-- Schritt 1 + 2: adaptive Tinte -->
  <g fill="currentColor">
    <text x="82"  y="105" text-anchor="middle" font-size="13" font-weight="600">1</text>
    <text x="342" y="105" text-anchor="middle" font-size="13" font-weight="600">2</text>
    <text x="108" y="105" font-size="17" font-weight="600">Erfassen</text>
    <text x="368" y="105" font-size="17" font-weight="600">Prüfen</text>
    <text x="72"  y="142" font-size="12.5" fill-opacity="0.6">Daten aufnehmen,</text>
    <text x="72"  y="159" font-size="12.5" fill-opacity="0.6">Quelle notieren.</text>
    <text x="332" y="142" font-size="12.5" fill-opacity="0.6">Gegen Kriterien</text>
    <text x="332" y="159" font-size="12.5" fill-opacity="0.6">abgleichen.</text>
  </g>

  <!-- Schritt 3 auf Lime-Fläche: FIXE dunkle Schrift (currentColor wäre im Dark unlesbar) -->
  <g fill="#22310F">
    <text x="602" y="105" text-anchor="middle" font-size="13" font-weight="600">3</text>
    <text x="628" y="105" font-size="17" font-weight="600">Freigeben</text>
    <text x="592" y="142" font-size="12.5" fill-opacity="0.78">Entscheid</text>
    <text x="592" y="159" font-size="12.5" fill-opacity="0.78">dokumentieren.</text>
  </g>
</svg>
